name: automation-tool

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiqa
      POSTGRES_PASSWORD: aiqa_secret
      POSTGRES_DB: aiqa_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiqa -d aiqa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/neo4j_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    image: automation-tool-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aiqa:aiqa_secret@postgres:5432/aiqa_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_secret
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FERNET_KEY: ${FERNET_KEY:?Set FERNET_KEY in .env}
      FIREBASE_PROJECT_ID: code-automation-tool
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      PLAYWRIGHT_HEADLESS: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-lmstudio}
      LMSTUDIO_API_BASE: ${LMSTUDIO_API_BASE:-http://host.docker.internal:1234/v1}
      LMSTUDIO_BRAIN_API_BASE: ${LMSTUDIO_BRAIN_API_BASE:-http://host.docker.internal:1234/v1}
      LMSTUDIO_MODEL: ${LMSTUDIO_MODEL:-mistralai/devstral-small-2505}
      LMSTUDIO_BRAIN_MODEL: ${LMSTUDIO_BRAIN_MODEL:-mistralai/devstral-small-2505}
      LMSTUDIO_EMBEDDING_MODEL: ${LMSTUDIO_EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      AZURE_DEVOPS_WORKSPACE_DIR: /app/data/azure_workspaces
      LOCAL_WORKSPACE_DIR: /app/data/local_workspaces
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/artifacts:/app/artifacts
      - azure_workspaces:/app/data/azure_workspaces
      - local_workspaces:/app/data/local_workspaces
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    profiles: ["docker-frontend"]
    image: automation-tool-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-code-automation-tool.firebaseapp.com}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-code-automation-tool}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-code-automation-tool.firebasestorage.app}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  azure_workspaces:
  local_workspaces:
